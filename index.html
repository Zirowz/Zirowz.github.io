<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Générateur d'Excuses</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #282c36;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
        }
        button {
            font-size: 1.2rem;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background-color: #ff5733;
            color: white;
            margin-top: 20px;
        }
        #excuse {
            margin-top: 20px;
            font-size: 1.5rem;
            max-width: 80%;
        }
    </style>
</head>
<body>
    <h1>Besoin d'une excuse ?</h1>
    <button onclick="generateExcuse()">Générer une excuse</button>
    <p id="excuse"></p>
    <script>
        function generateExcuse() {
            const subjects = ["Mon chat", "Mon voisin", "Mon prof de sport", "Un pigeon", "Mon ordi", "Un alien", "Ma grand-mère"];
            const actions = ["a mangé", "a cassé", "a volé", "a oublié", "a effacé", "a transformé", "a congelé"];
            const objects = ["mes devoirs", "ma voiture", "mon réveil", "mon portable", "ma mémoire", "mes chaussures", "mon sandwich"];
            
            const excuse = `${subjects[Math.floor(Math.random() * subjects.length)]} ` +
                           `${actions[Math.floor(Math.random() * actions.length)]} ` +
                           `${objects[Math.floor(Math.random() * objects.length)]}.`;
            
            document.getElementById("excuse").textContent = excuse;
        }
    </script>
</body>
</html>
