<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0"
        <title>Connexion / Inscription</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <div class="from-container">
            <div class="form-box">
                <h2 id="form-title">Connexion</h2>

                <form id="login-form">
                    <div class="input-group">
                        <label for="login-email">Email ou Nom d'utilisateur</label>
                        <input type="text" id="login-email" required>
                    </div>
                    <div class="input-group">
                        <labed for="login-password">Mot de passe</labed>
                        <input type="password" id="login-password" required>
                    </div>
                    <button type="submit" class="btn">Se connecter</button>
                    <p class="toggle-form">Pas encore inscrit ? <a href="#" id="show-register">Créer un compte</a></p>
                </form>
                <form id="register-form" style="display: none;">
                <div class="input-group">
                    <label for="register-username">Nom d'utilisateur</label>
                    <input type="text" id="register-username" required>
                </div>
                <div class="input-group">
                    <label for="register-email">Email</label>
                    <input type="email" id="register-mail" required>
                </div>
                <div class="input-group">
                    <label for="register-password">Mot de passe</label>
                    <input type="password" id="register-password" required>
                </div>
                <button type="submit" class="btn">S'inscrire</button>
                <p class="toggle-form">Déjà un compte ? <a href="#" id="show-login">Se connecter</a></p>
            </form>
            </div>
        </div>

        <script src="script.js"></script>
    </body>
</html>
